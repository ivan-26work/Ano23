<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ano23 — Envoyer un message anonyme</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background: #0ea5e9;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo svg {
            width: 32px;
            height: 32px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        
        .user-card {
            background: #f0f9ff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        
        .user-label {
            font-size: 12px;
            color: #0ea5e9;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: 800;
            color: #0284c7;
            font-family: monospace;
        }
        
        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-family: inherit;
            font-size: 16px;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #0ea5e9;
        }
        
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
            margin-bottom: 24px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14,165,233,0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .alert {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }
        
        .alert.success {
            background: #22c55e20;
            color: #16a34a;
            border: 1px solid #22c55e;
            display: block;
        }
        
        .alert.error {
            background: #ef444420;
            color: #dc2626;
            border: 1px solid #ef4444;
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <svg viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="11" fill="white"/>
            <ellipse cx="10" cy="13" rx="2.5" ry="3" fill="#0ea5e9"/>
            <ellipse cx="18" cy="13" rx="2.5" ry="3" fill="#0ea5e9"/>
            <path d="M10 18.5 Q14 21 18 18.5" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
    </div>
    
    <h1>Message anonyme</h1>
    <div class="sub">Votre message sera envoyé de façon totalement anonyme</div>
    
    <div class="user-card">
        <div class="user-label">📨 Message pour</div>
        <div class="user-name" id="targetUser">Chargement...</div>
    </div>
    
    <textarea id="messageInput" placeholder="Écrivez votre message anonyme ici..."></textarea>
    <div class="char-count"><span id="charCount">0</span> caractères</div>
    
    <button id="sendBtn">📤 Envoyer anonymement</button>
    
    <div id="alert" class="alert"></div>
    <div class="footer">💫 100% anonyme • L'expéditeur ne sera jamais révélé</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============================================================
    // CONFIGURATION SUPABASE (Service Role Key)
    // ============================================================
    const SUPABASE_URL = 'https://waogbrxqyysibttlpoxj.supabase.co';
    const SUPABASE_SERVICE_ROLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhb2dicnhxeXlzaWJ0dGxwb3hqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTE2MTc3NSwiZXhwIjoyMDkwNzM3Nzc1fQ.Kxkn1avkOGI7FHOHMZDkPDRVXs9wGIC2BZkW5wYZwfM';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE);
    
    // ============================================================
    // VARIABLES
    // ============================================================
    let targetUserId = null;
    
    // ============================================================
    // INITIALISATION
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        // Récupérer l'ID depuis l'URL
        const params = new URLSearchParams(window.location.search);
        targetUserId = params.get('uid');
        
        const targetUserEl = document.getElementById('targetUser');
        
        if (targetUserId) {
            targetUserEl.textContent = `@${targetUserId}`;
        } else {
            targetUserEl.textContent = 'Utilisateur inconnu';
            showAlert('❌ Lien invalide. Utilisateur non trouvé.', 'error');
            document.getElementById('sendBtn').disabled = true;
        }
        
        // Compteur de caractères
        const messageInput = document.getElementById('messageInput');
        const charCount = document.getElementById('charCount');
        
        messageInput.addEventListener('input', () => {
            const count = messageInput.value.length;
            charCount.textContent = count;
        });
        
        // Bouton d'envoi
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
    });
    
    // ============================================================
    // ENVOI DU MESSAGE (avec Service Role)
    // ============================================================
    async function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();
        const sendBtn = document.getElementById('sendBtn');
        
        // Validation
        if (!targetUserId) {
            showAlert('❌ Destinataire invalide', 'error');
            return;
        }
        
        if (message.length === 0) {
            showAlert('✏️ Veuillez écrire un message', 'error');
            messageInput.focus();
            return;
        }
        
        if (message.length > 500) {
            showAlert('📏 Message trop long (max 500 caractères)', 'error');
            return;
        }
        
        // Désactiver le bouton pendant l'envoi
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner"></span> Envoi en cours...';
        
        try {
            // Insertion avec Service Role (contourne les RLS)
            const { data, error } = await sb
                .from('messages')
                .insert({
                    user_id: targetUserId,
                    content: message,
                    read: false,
                    created_at: new Date().toISOString()
                })
                .select();
            
            if (error) throw error;
            
            // Succès
            showAlert('✅ Message envoyé anonymement !', 'success');
            messageInput.value = '';
            document.getElementById('charCount').textContent = '0';
            
            // Réactiver le bouton après 2 secondes
            setTimeout(() => {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '📤 Envoyer anonymement';
            }, 2000);
            
        } catch (error) {
            console.error('Erreur détaillée:', error);
            showAlert(`❌ Erreur: ${error.message || 'Impossible d\'envoyer'}`, 'error');
            sendBtn.disabled = false;
            sendBtn.innerHTML = '📤 Envoyer anonymement';
        }
    }
    
    // ============================================================
    // AFFICHAGE DES ALERTES
    // ============================================================
    function showAlert(message, type) {
        const alertEl = document.getElementById('alert');
        alertEl.textContent = message;
        alertEl.className = `alert ${type}`;
        
        setTimeout(() => {
            alertEl.className = 'alert';
        }, 4000);
    }
</script>

</body>
</html>
