<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ano23 — Message anonyme</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      transition: background-image 0.5s ease;
    }

    /* Arrière-plan par défaut (image3.png) */
    body {
      background-image: url('images/image3.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Overlay pour assombrir légèrement l'arrière-plan */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 12px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-info {
      flex: 1;
    }

    .username {
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .username span {
      opacity: 0.7;
    }

    /* Type selector */
    .type-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .type-selector::-webkit-scrollbar {
      display: none;
    }

    .type-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 40px;
      padding: 10px 12px;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 13px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .type-btn.active {
      background: #0ea5e9;
      border-color: white;
    }

    .type-btn:active {
      transform: scale(0.97);
    }

    /* Message card */
    .message-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
    }

    .message-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message-input {
      width: 100%;
      min-height: 120px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    .message-input:focus {
      border-color: #0ea5e9;
    }

    .random-btn {
      margin-top: 12px;
      background: #f1f5f9;
      border: none;
      border-radius: 40px;
      padding: 10px 16px;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 13px;
      color: #475569;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .random-btn:active {
      transform: scale(0.96);
    }

    /* Send button */
    .send-btn {
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 60px;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    .send-btn:active {
      transform: scale(0.98);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Success screen */
    .success-screen {
      display: none;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
      animation: fadeIn 0.4s ease-out;
    }

    .success-screen.show {
      display: block;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: bounce 0.5s ease-out;
    }

    .success-screen h2 {
      font-size: 24px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 20px;
    }

    .invite-btn {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 15px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
      animation: pulse 2s infinite;
    }

    .invite-btn:active {
      transform: scale(0.96);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); box-shadow: 0 4px 20px rgba(14,165,233,0.5); }
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
    }

    .footer a {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: white;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .main-content.hide {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Header -->
  <div class="header">
    <div class="avatar" id="userAvatar">
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="user-info">
      <div class="username">@<span id="username">utilisateur</span></div>
      <div class="username" style="font-size: 11px; opacity: 0.7;"><span id="userTagline">envoie-moi un message anonyme</span></div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="main-content" id="mainContent">
    
    <!-- Sélecteur de type -->
    <div class="type-selector" id="typeSelector">
      <button class="type-btn active" data-type="message">
        <i class="fas fa-envelope"></i> Message
      </button>
      <button class="type-btn" data-type="question">
        <i class="fas fa-question-circle"></i> Question
      </button>
      <button class="type-btn" data-type="discussion">
        <i class="fas fa-comments"></i> Discussion
      </button>
    </div>

    <!-- Carte message -->
    <div class="message-card">
      <div class="message-label">Votre message anonyme</div>
      <textarea class="message-input" id="messageInput" placeholder="Écrivez votre message ici..." maxlength="500" rows="4"></textarea>
      <button class="random-btn" id="randomBtn">
        <i class="fas fa-dice"></i> Message aléatoire
      </button>
    </div>

    <!-- Bouton envoyer -->
    <button class="send-btn" id="sendBtn">
      <i class="fas fa-paper-plane"></i> Envoyer
      <span class="spinner" id="sendSpinner"></span>
    </button>

  </div>

  <!-- Écran de succès -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <h2>Message envoyé !</h2>
    <p>Votre message anonyme a bien été transmis.</p>
    <button class="invite-btn" id="inviteBtn">
      👉 Recevez vos propres messages !
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="confidentialite.html">Confidentialité</a>
    <a href="cgu.html">Conditions</a>
  </div>

</div>

<script>
  // ============================================================
  // SUPABASE CONFIG
  // ============================================================
  const SUPABASE_URL = 'https://waogbrxqyysibttlpoxj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhb2dicnhxeXlzaWJ0dGxwb3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjE3NzUsImV4cCI6MjA5MDczNzc3NX0.Op1DUBfefbO2RkoitXws-7cFLW1T0DJGBDh1YPDcB1w';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ============================================================
  // PARAMS URL
  // ============================================================
  const params = new URLSearchParams(window.location.search);
  const targetUid = params.get('uid');
  const urlType = params.get('type') || 'message';

  // ============================================================
  // ÉTAT
  // ============================================================
  let currentType = urlType;
  let currentUserAvatar = null;

  // ============================================================
  // MESSAGES ALÉATOIRES PAR TYPE
  // ============================================================
  const RANDOM_MESSAGES = {
    message: [
      "Tu m'inspires vraiment, continue comme ça !",
      "J'aime vraiment ta façon d'être",
      "T'as une énergie incroyable, garde-la !",
      "Ton sourire donne la bonne humeur à tout le monde",
      "Tu es quelqu'un de vraiment spécial",
      "Continue d'être toi-même, c'est ta plus grande force"
    ],
    question: [
      "C'est quoi ton rêve le plus fou ?",
      "Si tu pouvais changer une chose dans ta vie, ce serait quoi ?",
      "Quel est ton plus grand secret ?",
      "Qu'est-ce qui te rend vraiment heureux(se) ?",
      "Si tu pouvais vivre n'importe où, où serais-tu ?",
      "Quelle est la chose dont tu es le plus fier(e) ?"
    ],
    discussion: [
      "Salut ! On discute ?",
      "Quoi de neuf aujourd'hui ?",
      "Comment tu te sens en ce moment ?",
      "Raconte-moi ta journée !",
      "Tu penses à quoi en ce moment ?",
      "Un sujet qui te passionne ?"
    ]
  };

  // ============================================================
  // TEXTE PAR TYPE
  // ============================================================
  const TYPE_TAGLINE = {
    message: "envoie-moi un message anonyme",
    question: "pose-moi une question anonyme",
    discussion: "discutons anonymement"
  };

  // ============================================================
  // REDIRECTION SI PAS D'UID
  // ============================================================
  if (!targetUid) {
    document.body.innerHTML = `
      <div class="container" style="text-align:center;background:white;border-radius:28px;padding:40px">
        <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#ef4444"></i>
        <h2 style="margin-top:16px">Lien invalide</h2>
        <p style="margin-top:8px">Ce lien de partage est incorrect.</p>
        <button onclick="window.location.href='auth.html'" style="margin-top:24px;padding:12px 24px;background:#0ea5e9;color:white;border:none;border-radius:40px">Créer mon compte</button>
      </div>
    `;
    throw new Error('UID manquant');
  }

  // ============================================================
  // AFFICHAGE HEADER
  // ============================================================
  document.getElementById('username').textContent = targetUid;
  document.getElementById('userTagline').textContent = TYPE_TAGLINE[currentType] || TYPE_TAGLINE.message;

  // ============================================================
  // RÉCUPÉRATION DE L'AVATAR (LOCALSTORAGE)
  // ============================================================
  function loadAvatar() {
    const savedAvatar = localStorage.getItem(`ano23-avatar-${targetUid}`);
    const avatarDiv = document.getElementById('userAvatar');
    
    if (savedAvatar) {
      avatarDiv.innerHTML = `<img src="${savedAvatar}" alt="avatar">`;
      currentUserAvatar = savedAvatar;
      
      // Appliquer l'avatar flouté en arrière-plan avec transition
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.filter = 'blur(25px)';
        ctx.drawImage(img, 0, 0);
        const blurredUrl = canvas.toDataURL('image/png');
        
        // Transition fluide
        document.body.style.transition = 'background-image 0.5s ease';
        document.body.style.backgroundImage = `url('${blurredUrl}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundAttachment = 'fixed';
      };
      img.src = savedAvatar;
    } else {
      // Pas d'avatar, garder image3.png par défaut
      avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
      document.body.style.backgroundImage = "url('images/image3.png')";
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundAttachment = 'fixed';
    }
  }

  // ============================================================
  // SÉLECTION DU TYPE
  // ============================================================
  function initTypeSelector() {
    const btns = document.querySelectorAll('.type-btn');
    btns.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.type === currentType) {
        btn.classList.add('active');
      }
      btn.addEventListener('click', () => {
        currentType = btn.dataset.type;
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('userTagline').textContent = TYPE_TAGLINE[currentType] || TYPE_TAGLINE.message;
      });
    });
  }

  // ============================================================
  // MESSAGE ALÉATOIRE
  // ============================================================
  function setRandomMessage() {
    const messages = RANDOM_MESSAGES[currentType] || RANDOM_MESSAGES.message;
    const randomMsg = messages[Math.floor(Math.random() * messages.length)];
    document.getElementById('messageInput').value = randomMsg;
  }

  document.getElementById('randomBtn').addEventListener('click', setRandomMessage);

  // ============================================================
  // AFFICHAGE SUCCÈS
  // ============================================================
  function showSuccess() {
    document.getElementById('mainContent').classList.add('hide');
    document.getElementById('successScreen').classList.add('show');
  }

  // ============================================================
  // ENVOI DU MESSAGE
  // ============================================================
  async function sendMessage() {
    const message = document.getElementById('messageInput').value.trim();
    if (!message) {
      alert('Veuillez écrire un message');
      return;
    }

    const sendBtn = document.getElementById('sendBtn');
    const spinner = document.getElementById('sendSpinner');
    const btnText = sendBtn.querySelector('i');
    
    sendBtn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'inline-block';

    try {
      const { error } = await sb.from('messages').insert({
        user_id: targetUid,
        content: message,
        type: currentType,
        is_chat: false,
        read: false,
        created_at: new Date().toISOString()
      });

      if (error) throw error;

      showSuccess();

    } catch (err) {
      console.error('Erreur:', err);
      alert('Erreur: ' + err.message);
      sendBtn.disabled = false;
      btnText.style.display = 'inline-block';
      spinner.style.display = 'none';
    }
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);

  // ============================================================
  // BOUTON INVITATION
  // ============================================================
  document.getElementById('inviteBtn').addEventListener('click', () => {
    window.location.href = 'auth.html';
  });

  // ============================================================
  // INIT
  // ============================================================
  loadAvatar();
  initTypeSelector();
  
  // Message aléatoire par défaut
  setTimeout(() => {
    if (!document.getElementById('messageInput').value) {
      setRandomMessage();
    }
  }, 100);
</script>
</body>
</html>
