<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Ano23 — Message anonyme</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background:
      url('images/image3.png') center/cover no-repeat fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* Overlay léger pour lisibilité */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.18);
    z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
    flex: 1;
  }

  /* ======== CADRE PRINCIPAL ======== */
  .main-card {
    width: 100%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  /* Header cadre */
  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.4);
  }

  .user-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #e0f2fe;
    border: 2.5px solid #0ea5e9;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    overflow: hidden;
  }
  .user-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .user-info { flex: 1; min-width: 0; }
  .user-uid {
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: #0284c7;
  }
  .user-tagline {
    font-size: 13px; font-weight: 600;
    color: #475569; margin-top: 2px;
  }

  /* Zone texte */
  .card-body { padding: 4px 16px 16px; position: relative; }

  .msg-textarea {
    width: 100%;
    min-height: 130px;
    background: transparent;
    border: none; outline: none; resize: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 600;
    color: white;
    padding: 16px 0 8px;
    line-height: 1.6;
  }
  .msg-textarea::placeholder { color: rgba(255,255,255,0.65); }

  .card-footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 0;
  }

  .char-count {
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.6);
  }
  .char-count.warn { color: #fbbf24; }
  .char-count.over { color: #f87171; }

  .btn-dice {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 12px;
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
    backdrop-filter: blur(6px);
  }
  .btn-dice:hover  { background: rgba(255,255,255,0.38); }
  .btn-dice:active { transform: scale(0.92) rotate(30deg); }

  /* ======== BOUTON ENVOYER ======== */
  .btn-send {
    width: 100%;
    padding: 17px;
    background: #22c55e;
    color: white;
    border: none; border-radius: 50px;
    font-family: inherit;
    font-size: 17px; font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 20px rgba(34,197,94,0.45);
    transition: transform .2s, box-shadow .2s, opacity .2s;
  }
  .btn-send:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(34,197,94,0.55); }
  .btn-send:active { transform: translateY(0); }
  .btn-send:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }

  /* Spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .65s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ======== ALERTE ======== */
  .alert {
    width: 100%;
    padding: 0; max-height: 0; overflow: hidden;
    border-radius: 16px;
    font-size: 14px; font-weight: 700;
    text-align: center;
    transition: max-height .25s, padding .25s;
  }
  .alert.show { max-height: 60px; padding: 13px 16px; }
  .alert.success { background: rgba(34,197,94,.15); color: #16a34a; border: 1px solid rgba(34,197,94,.4); }
  .alert.error   { background: rgba(239,68,68,.15);  color: #dc2626;  border: 1px solid rgba(239,68,68,.4); }

  /* ======== TYPE LABEL ======== */
  .type-label {
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,.8);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .type-label span { font-size: 16px; }

  /* ======== BOUTON RECEVOIR ======== */
  .btn-receive {
    width: 100%;
    padding: 17px;
    background: rgba(0,0,0,0.75);
    color: white;
    border: none; border-radius: 50px;
    font-family: inherit;
    font-size: 15px; font-weight: 800;
    cursor: pointer;
    transition: background .2s, transform .15s;
    backdrop-filter: blur(6px);
    text-decoration: none;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-receive:hover { background: rgba(0,0,0,0.88); transform: translateY(-1px); }
  .btn-receive:active { transform: translateY(0); }

  /* ======== FOOTER ======== */
  .page-footer {
    position: relative; z-index: 1;
    display: flex; gap: 20px;
    padding: 12px 0 8px;
  }
  .page-footer a {
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,.65);
    text-decoration: none;
    transition: color .2s;
  }
  .page-footer a:hover { color: white; }

  /* ======== SUCCÈS SCREEN ======== */
  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    padding: 40px 20px;
  }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 64px; animation: pop .4s cubic-bezier(.22,1,.36,1); }
  @keyframes pop { from{transform:scale(0);} to{transform:scale(1);} }
  .success-screen h2 { font-size: 22px; font-weight: 800; color: white; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .success-screen p  { font-size: 14px; color: rgba(255,255,255,.8); font-weight: 600; }

  </style>
</head>
<body>

<div class="page" id="mainPage">

  <!-- Cadre principal -->
  <div class="main-card">
    <!-- Header -->
    <div class="card-header">
      <div class="user-avatar" id="userAvatar">😎</div>
      <div class="user-info">
        <div class="user-uid" id="userUid">@ipoteivan5</div>
        <div class="user-tagline" id="userTagline">envoie-moi des messages anonymes !</div>
      </div>
    </div>
    <!-- Body -->
    <div class="card-body">
      <textarea
        class="msg-textarea"
        id="msgInput"
        placeholder="Écris ton message ici..."
        maxlength="500"
      ></textarea>
      <div class="card-footer-row">
        <span class="char-count" id="charCount">0 / 500</span>
        <button class="btn-dice" id="diceBtn" title="Message aléatoire">🎲</button>
      </div>
    </div>
  </div>

  <!-- Label type -->
  <div class="type-label" id="typeLabel">
    <span>🔒</span> Messages anonymes
  </div>

  <!-- Bouton Envoyer -->
  <button class="btn-send" id="sendBtn">
    <span class="btn-text">Envoyer !</span>
    <span class="spinner" id="sendSpinner"></span>
  </button>

  <!-- Alerte -->
  <div class="alert" id="alertBox"></div>

  <!-- Bouton Recevoir -->
  <a href="auth.html" class="btn-receive">
    📥 Reçois tes propres messages !
  </a>

</div>

<!-- Succès screen (remplace le contenu) -->
<div class="page success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <h2>Message envoyé !</h2>
  <p>Ton message anonyme a bien été transmis.<br/>L'expéditeur ne saura jamais que c'est toi 🤫</p>
  <a href="auth.html" class="btn-receive" style="margin-top:8px">
    📥 Reçois tes propres messages !
  </a>
</div>

<!-- Footer -->
<div class="page-footer">
  <a href="confidentialite.html">Confidentialité</a>
  <a href="cgu.html">Conditions</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
const SUPABASE_URL      = 'https://waogbrxqyysibttlpoxj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhb2dicnhxeXlzaWJ0dGxwb3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjE3NzUsImV4cCI6MjA5MDczNzc3NX0.Op1DUBfefbO2RkoitXws-7cFLW1T0DJGBDh1YPDcB1w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// PARAMS URL
// ============================================================
const params       = new URLSearchParams(window.location.search);
const targetUid    = params.get('uid')  || 'demo';
const msgType      = params.get('type') || 'message';

// ============================================================
// TEXTES SELON TYPE
// ============================================================
const TYPES = {
  message: {
    tagline:     'envoie-moi des messages anonymes !',
    label:       '🔒 Messages anonymes',
    placeholder: 'Écris ton message ici...',
  },
  question: {
    tagline:     'pose-moi une question anonyme !',
    label:       '❓ Questions anonymes',
    placeholder: 'Écris ta question ici...',
  },
  secret: {
    tagline:     'dis-moi un truc que tu as toujours voulu me dire !',
    label:       '🤫 Secret anonyme',
    placeholder: 'Dis-moi ce que tu as sur le cœur...',
  },
};

const typeConfig = TYPES[msgType] || TYPES.message;

// ============================================================
// MESSAGES ALÉATOIRES SELON TYPE
// ============================================================
const RANDOM = {
  message: [
    "Tu m'inspires vraiment, continue comme ça ! 🔥",
    "J'aime vraiment ta façon d'être 💙",
    "T'as une énergie incroyable, garde-la !",
    "Ton sourire donne la bonne humeur à tout le monde 😊",
    "Tu es quelqu'un de vraiment spécial ✨",
    "Continue d'être toi-même, c'est ta plus grande force 💪",
  ],
  question: [
    "C'est quoi ton rêve le plus fou ? 🌟",
    "Si tu pouvais changer une chose dans ta vie, ce serait quoi ?",
    "Quel est ton plus grand secret ? 🤫",
    "Qu'est-ce qui te rend vraiment heureux(se) ? 😊",
    "Si tu pouvais vivre n'importe où, où serais-tu ?",
    "Quelle est la chose dont tu es le plus fier(e) ? 🏆",
  ],
  secret: [
    "J'ai toujours admiré ta façon de voir les choses 🙏",
    "Tu m'as changé sans même le savoir 💙",
    "J'ai toujours voulu te dire que tu comptes vraiment pour moi",
    "Ta présence rend tout plus léger, merci ✨",
    "Je pense souvent à une conversation qu'on a eue 💭",
    "Tu mérites tellement plus que ce que tu penses 🌟",
  ],
};

// ============================================================
// INIT UI
// ============================================================
document.getElementById('userUid').textContent     = `@${targetUid}`;
document.getElementById('userTagline').textContent = typeConfig.tagline;
document.getElementById('typeLabel').innerHTML     = typeConfig.label;
document.getElementById('msgInput').placeholder    = typeConfig.placeholder;

// ============================================================
// COMPTEUR CARACTÈRES
// ============================================================
const msgInput  = document.getElementById('msgInput');
const charCount = document.getElementById('charCount');

msgInput.addEventListener('input', () => {
  const len = msgInput.value.length;
  charCount.textContent = `${len} / 500`;
  charCount.className = 'char-count' + (len > 450 ? ' warn' : '') + (len >= 500 ? ' over' : '');
});

// ============================================================
// BOUTON DÉ
// ============================================================
document.getElementById('diceBtn').addEventListener('click', () => {
  const pool = RANDOM[msgType] || RANDOM.message;
  const txt  = pool[Math.floor(Math.random() * pool.length)];
  msgInput.value = txt;
  msgInput.dispatchEvent(new Event('input'));
});

// ============================================================
// ALERTE
// ============================================================
function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert show ${type}`;
  setTimeout(() => { el.className = 'alert'; }, 4000);
}

// ============================================================
// ENVOI
// ============================================================
document.getElementById('sendBtn').addEventListener('click', async () => {
  const message = msgInput.value.trim();
  const sendBtn = document.getElementById('sendBtn');

  if (!message) {
    showAlert('✏️ Écris un message d\'abord !', 'error');
    msgInput.focus(); return;
  }
  if (message.length > 500) {
    showAlert('📏 Message trop long (max 500 caractères)', 'error'); return;
  }

  // Loading
  sendBtn.disabled = true;
  sendBtn.querySelector('.btn-text').style.display   = 'none';
  sendBtn.querySelector('#sendSpinner').style.display = 'inline-block';

  try {
    const { error } = await sb.from('messages').insert({
      user_id:    targetUid,
      content:    message,
      type:       msgType,
      read:       false,
      created_at: new Date().toISOString(),
    });

    if (error) throw error;

    // Succès → afficher écran succès
    document.getElementById('mainPage').style.display    = 'none';
    document.getElementById('successScreen').classList.add('show');

  } catch (err) {
    showAlert(`❌ Erreur : ${err.message || 'Impossible d\'envoyer'}`, 'error');
    sendBtn.disabled = false;
    sendBtn.querySelector('.btn-text').style.display    = '';
    sendBtn.querySelector('#sendSpinner').style.display = 'none';
  }
});
</script>
</body>
</html>
